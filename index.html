<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
      body { padding: 20px; font-family: sans-serif; }
      .container { max-width: 400px; margin: auto; }
    </style>
  </head>
  <body>
    <div class="container">
      <h3 class="mb-4">บันทึกสินค้าหมดอายุ</h3>
      <form id="expiryForm">
        <div class="mb-3">
          <label class="form-label">สแกนบาร์โค้ด</label>
          <input type="text" class="form-control" id="barcode" name="barcode" placeholder="คลิกเพื่อสแกน" required>
        </div>
        <div class="mb-3">
          <label class="form-label">ชื่อสินค้า</label>
          <input type="text" class="form-control" name="productName">
        </div>
        <div class="mb-3">
          <label class="form-label">จำนวน</label>
          <input type="number" class="form-control" name="quantity" required>
        </div>
        <div class="mb-3">
          <label class="form-label">วันหมดอายุ</label>
          <input type="date" class="form-control" name="expiryDate" required>
        </div>
        <div class="mb-3">
          <label class="form-label">แผนก</label>
          <select class="form-select" name="department">
            <option value="อาหารสด">อาหารสด</option>
            <option value="เครื่องดื่ม">เครื่องดื่ม</option>
            <option value="ของใช้">ของใช้</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">บันทึกข้อมูล</button>
      </form>
    </div>

    <script>
      document.getElementById('expiryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        google.script.run.withSuccessHandler(function(res) {
          alert(res);
          document.getElementById('expiryForm').reset();
        }).processForm(this);
      });
    </script>
  </body>
</html>
