<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #reader { width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 0 20px rgba(0,255,127,0.2); background: #000; }
    .form-container { background: #2d2d2d; border-radius: 20px; padding: 25px; margin-top: -30px; position: relative; z-index: 10; }
    .form-control, .form-select { background: #3d3d3d; border: 1px solid #4d4d4d; color: #fff; border-radius: 10px; padding: 12px; }
    .form-control:focus { background: #444; border-color: #00ff7f; color: #fff; box-shadow: none; }
    .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 127, 0.8); box-shadow: 0 0 10px #00ff7f; animation: move 2s infinite linear; }
    @keyframes move { 0% { top: 0%; } 100% { top: 100%; } }
    .last-scan { font-size: 0.8rem; color: #00ff7f; font-weight: bold; }
  </style>
</head>
<body>

<div class="container-fluid p-0">
  <div style="position: relative;">
    <div id="reader"></div>
    <div class="scan-line"></div>
  </div>

  <div class="container">
    <div class="form-container shadow-lg">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="m-0">📦 สแกนรับสินค้า</h5>
        <span id="scan-status" class="badge bg-success">Ready</span>
      </div>

      <form id="barcodeForm">
        <div class="mb-3">
          <label class="small text-uppercase text-muted">Barcode Number</label>
          <input type="text" id="barcode" name="barcode" class="form-control form-control-lg" readonly placeholder="Waiting for scan...">
          <div id="last-code" class="last-scan mt-1"></div>
        </div>

        <div class="mb-3">
          <label class="small text-uppercase text-muted">Product Name</label>
          <input type="text" id="pName" name="pName" class="form-control" required>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
            <label class="small text-uppercase text-muted">Qty</label>
            <input type="number" name="qty" class="form-control" value="1" min="1">
          </div>
          <div class="col-6 mb-3">
            <label class="small text-uppercase text-muted">Dept</label>
            <select name="dept" class="form-select">
              <option value="IT">IT</option>
              <option value="Stock">Stock</option>
              <option value="Sales">Sales</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="small text-uppercase text-muted">Expiry Date</label>
          <input type="date" name="expiry" id="expiry" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success w-100 py-3 fw-bold shadow">บันทึกเข้า Google Sheet</button>
      </form>
    </div>
  </div>
</div>

<script>
  let lastScannedCode = "";
  let isThrottled = false;

  // 1. ตั้งค่า Scanner
  const html5QrCode = new Html5Qrcode("reader");
  const config = { 
    fps: 20, // ความเร็วในการประมวลผลเฟรมต่อวินาที
    qrbox: { width: 280, height: 160 }, // ขอบเขตการสแกน (สี่เหลี่ยมผืนผ้าเหมาะกับบาร์โค้ด)
    aspectRatio: 1.0 
  };

  // 2. เริ่มการทำงานกล้องหลัง
  html5QrCode.start(
    { facingMode: "environment" }, 
    config,
    (decodedText) => {
      // Logic เมื่อสแกนติด
      if (isThrottled || decodedText === lastScannedCode) return;
      
      // Feedback
      if(navigator.vibrate) navigator.vibrate(150); // สั่น 150ms
      document.getElementById('barcode').value = decodedText;
      document.getElementById('last-code').innerText = "Latest: " + decodedText;
      
      // ดึงข้อมูลสินค้าจาก Sheet ทันที (Auto-Lookup)
      fetchProduct(decodedText);

      // หน่วงเวลาสแกนครั้งต่อไป 2 วินาที (ป้องกันสแกนซ้ำ)
      isThrottled = true;
      document.getElementById('scan-status').className = "badge bg-danger";
      document.getElementById('scan-status').innerText = "Cooldown...";
      
      setTimeout(() => {
        isThrottled = false;
        lastScannedCode = ""; 
        document.getElementById('scan-status').className = "badge bg-success";
        document.getElementById('scan-status').innerText = "Ready";
      }, 2000);
    }
  );

  function fetchProduct(code) {
    google.script.run.withSuccessHandler(res => {
      if(res) document.getElementById('pName').value = res;
      else document.getElementById('pName').focus(); // ถ้าไม่มีในฐานข้อมูล ให้ไปพิมพ์ชื่อเอง
    }).findProductByBarcode(code);
  }

  // 3. ระบบบันทึกข้อมูล
  document.getElementById('barcodeForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const submitBtn = e.target.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.innerText = "Saving...";

    google.script.run.withSuccessHandler(() => {
      alert("บันทึกสำเร็จ!");
      e.target.reset();
      submitBtn.disabled = false;
      submitBtn.innerText = "บันทึกเข้า Google Sheet";
      document.getElementById('barcode').value = "";
    }).saveToSheet(Object.fromEntries(new FormData(this)));
  });
</script>

</body>
</html>
