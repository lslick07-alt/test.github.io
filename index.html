<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #2563eb; }
    body { background: #f8fafc; padding-bottom: 50px; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; }
    .scanner-container { background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .btn-submit { background: var(--primary); color: white; padding: 12px; border-radius: 8px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h4 class="fw-bold text-center mb-4 text-primary">EXPIRY TRACKER PRO</h4>
    
    <div class="scanner-container mb-4">
      <div id="reader"></div>
      <div id="result-status" class="text-center mt-2 small text-muted">กล้องพร้อมใช้งาน</div>
    </div>

    <div class="card border-0 shadow-sm p-3">
      <form id="entryForm">
        <div class="mb-3">
          <label class="form-label small fw-bold">BARCODE</label>
          <input type="text" class="form-control" id="barcode" name="barcode" readonly required>
        </div>
        
        <div class="mb-3">
          <label class="form-label small fw-bold">PRODUCT NAME</label>
          <input type="text" class="form-control" id="productName" name="productName" placeholder="กำลังค้นหา..." required>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label small fw-bold">QUANTITY</label>
            <input type="number" class="form-control" name="quantity" value="1" required>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label small fw-bold">DEPARTMENT</label>
            <select class="form-select" name="department">
              <option value="Dry">Dry</option>
              <option value="Chilled">Chilled</option>
              <option value="Frozen">Frozen</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">EXPIRY DATE</label>
          <input type="date" class="form-control" name="expiryDate" required>
        </div>

        <button type="submit" class="btn btn-submit w-100 mt-2" id="submitBtn">บันทึกข้อมูล</button>
      </form>
    </div>
  </div>

  <script>
    // --- ระบบ Scanner ---
    const html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 150 } };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

    function onScanSuccess(decodedText) {
      if(navigator.vibrate) navigator.vibrate(100); // สั่นเมื่อสแกนติด
      document.getElementById('barcode').value = decodedText;
      document.getElementById('result-status').innerText = "สแกนสำเร็จ: " + decodedText;
      
      // ดึงชื่อสินค้าอัตโนมัติ
      google.script.run.withSuccessHandler(name => {
        if(name) document.getElementById('productName').value = name;
      }).getProductInfo(decodedText);
    }

    // --- ระบบบันทึกข้อมูล ---
    document.getElementById('entryForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = "กำลังบันทึก...";

      const formData = {
        barcode: this.barcode.value,
        productName: this.productName.value,
        quantity: this.quantity.value,
        department: this.department.value,
        expiryDate: this.expiryDate.value
      };

      google.script.run.withSuccessHandler(res => {
        alert(res.message);
        this.reset();
        btn.disabled = false;
        btn.innerText = "บันทึกข้อมูล";
      }).saveData(formData);
    });
  </script>
</body>
</html>
