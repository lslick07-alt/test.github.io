<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Inventory & Expiry Tracker V2</title>
    <style>
        :root {
            --primary: #6366F1;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
            --secondary: #64748B;
            --bg: #F8FAFC;
        }

        body {
            font-family: 'Chakra Petch', sans-serif; /* แนะนำให้ต่อเน็ตเพื่อให้ดึง Font สวยๆ ได้ */
            background-color: var(--bg);
            color: #1E293B;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }
        .card h3 { margin: 0; font-size: 0.85rem; color: var(--secondary); text-transform: uppercase; }
        .card p { margin: 8px 0 0; font-size: 1.8rem; font-weight: 800; color: #0F172A; }
        .card.warning { border-color: var(--warning); }
        .card.danger { border-color: var(--danger); }
        .card.total-qty { border-color: var(--success); }

        /* Form & Search */
        .action-bar {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .glass-panel {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.85rem; font-weight: 600; color: var(--secondary); }
        
        input {
            padding: 10px 14px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        /* Table Area */
        .search-box {
            width: 100%;
            margin-bottom: 15px;
            position: relative;
        }

        .table-wrapper {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #F1F5F9; padding: 15px; text-align: left; font-size: 0.85rem; color: var(--secondary); }
        td { padding: 15px; border-bottom: 1px solid #F1F5F9; font-size: 0.95rem; }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
        }
        .bg-success { background: #DCFCE7; color: #15803D; }
        .bg-warning { background: #FEF3C7; color: #92400E; }
        .bg-danger { background: #FEE2E2; color: #B91C1C; }

        .btn-del {
            color: var(--danger);
            background: none;
            border: 1px solid var(--danger);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-del:hover { background: var(--danger); color: white; }

    </style>
</head>
<body>

<div class="container">
    <h1 style="font-size: 1.5rem; margin-bottom: 25px;">🏪 ระบบคลังสินค้าอัจฉริยะ (v2.0)</h1>

    <div class="dashboard">
        <div class="card">
            <h3>รายการทั้งหมด</h3>
            <p id="totalItems">0</p>
        </div>
        <div class="card total-qty">
            <h3>จำนวนชิ้นรวม</h3>
            <p id="totalQty">0</p>
        </div>
        <div class="card warning">
            <h3>ใกล้หมดอายุ</h3>
            <p id="warningItems">0</p>
        </div>
        <div class="card danger">
            <h3>หมดอายุแล้ว</h3>
            <p id="expiredItems">0</p>
        </div>
    </div>

    <div class="action-bar">
        <div class="glass-panel">
            <form id="productForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label>บาร์โค้ดสินค้า</label>
                        <input type="text" id="barcode" placeholder="สแกนหรือพิมพ์เลข" required>
                    </div>
                    <div class="input-group">
                        <label>ชื่อสินค้า</label>
                        <input type="text" id="name" placeholder="ชื่อสินค้า" required>
                    </div>
                    <div class="input-group">
                        <label>หมวดหมู่</label>
                        <input type="text" id="category" placeholder="เช่น อาหาร, ยา" required>
                    </div>
                    <div class="input-group">
                        <label>จำนวน</label>
                        <input type="number" id="quantity" value="1" min="1" required>
                    </div>
                    <div class="input-group">
                        <label>วันหมดอายุ</label>
                        <input type="date" id="expiryDate" required>
                    </div>
                </div>
                <button type="submit" class="btn-add">📥 บันทึกรายการใหม่</button>
            </form>
        </div>

        <div class="glass-panel" style="display: flex; flex-direction: column; justify-content: center;">
            <div class="input-group">
                <label>🔍 ค้นหาด่วน</label>
                <input type="text" id="searchInput" placeholder="พิมพ์ชื่อ/บาร์โค้ด เพื่อค้นหา...">
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>บาร์โค้ด</th>
                    <th>ชื่อสินค้า</th>
                    <th>หมวดหมู่</th>
                    <th>จำนวน</th>
                    <th>วันหมดอายุ</th>
                    <th>สถานะ</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    class InventoryApp {
        constructor() {
            this.products = JSON.parse(localStorage.getItem('pro_inventory')) || [];
            this.form = document.getElementById('productForm');
            this.searchInput = document.getElementById('searchInput');
            
            this.init();
        }

        init() {
            this.form.addEventListener('submit', (e) => this.handleSubmit(e));
            this.searchInput.addEventListener('input', () => this.render());
            this.render();
        }

        handleSubmit(e) {
            e.preventDefault();
            const newProd = {
                id: Date.now(),
                barcode: document.getElementById('barcode').value,
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                quantity: parseInt(document.getElementById('quantity').value),
                expiryDate: document.getElementById('expiryDate').value
            };

            this.products.push(newProd);
            this.save();
            this.form.reset();
            document.getElementById('barcode').focus(); // พร้อมสแกนชิ้นต่อไปทันที
            this.render();
        }

        deleteItem(id) {
            if(confirm('ยืนยันการลบรายการนี้?')) {
                this.products = this.products.filter(p => p.id !== id);
                this.save();
                this.render();
            }
        }

        save() {
            localStorage.setItem('pro_inventory', JSON.stringify(this.products));
        }

        getStatus(expiryDate) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const exp = new Date(expiryDate);
            const diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));

            if (diff < 0) return { text: 'Expired', class: 'bg-danger', type: 'danger' };
            if (diff <= 7) return { text: `อีก ${diff} วัน`, class: 'bg-warning', type: 'warning' };
            return { text: 'ปกติ', class: 'bg-success', type: 'safe' };
        }

        render() {
            const tbody = document.getElementById('tableBody');
            const searchTerm = this.searchInput.value.toLowerCase();
            tbody.innerHTML = '';

            let stats = { total: 0, qty: 0, warning: 0, expired: 0 };

            // กรองข้อมูลตามการค้นหา
            const filtered = this.products.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.barcode.includes(searchTerm) ||
                p.category.toLowerCase().includes(searchTerm)
            );

            filtered.sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate));

            filtered.forEach(p => {
                const status = this.getStatus(p.expiryDate);
                
                // เก็บสถิติ
                stats.total++;
                stats.qty += p.quantity;
                if(status.type === 'warning') stats.warning++;
                if(status.type === 'danger') stats.expired++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-family: monospace; font-weight: bold;">${p.barcode}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.category}</td>
                    <td>${p.quantity.toLocaleString()}</td>
                    <td>${new Date(p.expiryDate).toLocaleDateString('th-TH')}</td>
                    <td><span class="badge ${status.class}">${status.text}</span></td>
                    <td><button class="btn-del" onclick="app.deleteItem(${p.id})">ลบ</button></td>
                `;
                tbody.appendChild(tr);
            });

            // Update Dashboard
            document.getElementById('totalItems').innerText = stats.total;
            document.getElementById('totalQty').innerText = stats.qty.toLocaleString();
            document.getElementById('warningItems').innerText = stats.warning;
            document.getElementById('expiredItems').innerText = stats.expired;
        }
    }

    const app = new InventoryApp();
</script>

</body>
</html>
