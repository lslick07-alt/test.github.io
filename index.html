<!DOCTYPE html>
<html>
<head>
    <title>ตอบมาเดี๋ยวนี้นะ!</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; }
        #no-btn { position: absolute; transition: 0.2s; }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>รักเค้าไหม?</h1>
    <button onclick="alert('รักเหมือนกันนะ! ❤️')">รักที่สุด</button>
    <button id="no-btn" onmouseover="moveButton()">ไม่รัก</button>

    <script>
        function moveButton() {
            var x = Math.random() * (window.innerWidth - 100);
            var y = Math.random() * (window.innerHeight - 100);
            document.getElementById('no-btn').style.left = x + 'px';
            document.getElementById('no-btn').style.top = y + 'px';
        }
    </script>
</body>
</html>
